<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-wrapper">
    <!-- 
      - Relative path avoids CORS issues entirely (Same-Origin).
      - crossorigin="anonymous" enables JS/Canvas frame access if needed.
      - preload="metadata" helps with initial load speed.
    -->
    <video 
      id="videoPlayer" 
      controls 
      crossorigin="anonymous" 
      preload="metadata"
      poster="assets/poster.jpg"> <!-- Optional cover image -->
      
      <source src="assets/video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

</body>
</html>
